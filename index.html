<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>

    <style>
    
      
    </style>
  </head>
  <body>
    <button id="mem1-button">Flower 1</button>
    <button id="mem2-button">Flower 2</button>
    <button id="mem3-button">Flower 3</button>

    <h1>My Top 3 Flowers</h1>
    
    <ol>
      <li>
        <h3 id="mem1">Flower 1</h3>
      <img class="flower-pic" src="https://florabundance.com/wp-content/uploads/2018/03/Sunflowers-1.jpg" >
      </li>

      <li>
        <h3 id="mem2">Flower 2</h3>
        <img class="flower-pic" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSvOEKPuqfS66TvoXP_fFQQxTrkScezqhPHFg&s" >
      </li>

      <li>
        <h3 id="mem3">Flower 3</h3>
       <img class="flower-pic" src="https://hips.hearstapps.com/hmg-prod/images/daffodil-narcissus-tete-a-tete-68dea86a12f8a.jpg?crop=0.536xw:1.00xh;0.260xw,0&resize=980:*" >
      </li>
    </ol>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
  
     
      $(".flower-pic").hide();

     //Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "orange"); 
        $("#mem1").text("Sunflowers"); 
        $("img").first().show(); 
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "yellow");
        $("#mem2").text("Plumeria");
        $(".flower-pic").eq(1).show(); 
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "yellow");
        $("#mem3").text("Daffodils");
        $(".flower-pic").last().show();
      });
    </script>
  </body>
</html>
